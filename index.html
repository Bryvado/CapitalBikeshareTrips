<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital Bikeshare — Trip Explorer</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Archivo+Black&family=Archivo:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.js"></script>
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111318;
    --border: #1e2229;
    --accent: #e8ff47;
    --accent2: #47c8ff;
    --red: #ff4757;
    --text: #e8eaf0;
    --muted: #5a6070;
    --panel-w: 360px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Archivo', sans-serif;
    font-weight: 300;
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* ─── SIDEBAR ─── */
  #sidebar {
    width: var(--panel-w);
    height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 10;
    flex-shrink: 0;
  }

  #sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  #sidebar-header h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 15px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    line-height: 1.2;
  }

  #sidebar-header p {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.04em;
  }

  #stats-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .stat {
    background: var(--surface);
    padding: 12px 16px;
  }

  .stat-val {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 3px;
  }

  #filters {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .filter-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .filter-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    width: 60px;
    flex-shrink: 0;
  }

  select, input[type=range] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 8px;
    border-radius: 3px;
    flex: 1;
    outline: none;
    cursor: pointer;
  }

  select:focus { border-color: var(--accent); }

  .chip-group {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    flex: 1;
  }

  .chip {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 2px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    color: var(--muted);
    user-select: none;
  }

  .chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,71,0.08);
  }

  #load-btn {
    margin: 0 16px 14px;
    background: var(--accent);
    color: var(--bg);
    font-family: 'Archivo Black', sans-serif;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: none;
    padding: 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  #load-btn:hover { opacity: 0.85; }
  #load-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #status {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    padding: 0 16px 10px;
    min-height: 16px;
  }

  /* ─── LEADERBOARD ─── */
  #leaderboard-header {
    padding: 10px 16px 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #leaderboard-header span {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
  }

  #sort-select {
    padding: 3px 6px;
    font-size: 10px;
    width: auto;
    flex: none;
  }

  #trip-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .trip-card {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }

  .trip-card:hover { background: rgba(232,255,71,0.04); }
  .trip-card.active { background: rgba(232,255,71,0.08); border-left: 2px solid var(--accent); }

  .trip-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 4px;
  }

  .trip-type {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent2);
  }

  .trip-metric {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
  }

  .trip-meta {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.4;
  }

  .trip-meta strong { color: var(--text); font-weight: 400; }

  /* ─── MAP ─── */
  #map {
    flex: 1;
    height: 100vh;
  }

  /* ─── TRIP DETAIL POPUP ─── */
  #detail-panel {
    position: absolute;
    bottom: 24px;
    right: 24px;
    width: 300px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    z-index: 20;
    display: none;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
  }

  #detail-panel.visible { display: block; }

  #detail-close {
    position: absolute;
    top: 10px;
    right: 12px;
    cursor: pointer;
    color: var(--muted);
    font-size: 14px;
    line-height: 1;
  }

  #detail-close:hover { color: var(--text); }

  .detail-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 10px;
    padding-right: 16px;
    letter-spacing: 0.04em;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
  }

  .detail-row:last-child { border: none; }
  .detail-row span:last-child { color: var(--text); text-align: right; }

  /* ─── LAYER TOGGLES ─── */
  #layer-toggles {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .layer-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 6px 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .layer-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,71,0.08);
  }

  /* ─── LOADING OVERLAY ─── */
  #loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(10,12,15,0.85);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  #loading-overlay.hidden { display: none; }

  .loading-text {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .loading-bar {
    width: 200px;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
  }

  .loading-bar-inner {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
    border-radius: 1px;
  }

  .mapboxgl-ctrl-bottom-left,
  .mapboxgl-ctrl-bottom-right { display: none; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>Capital Bikeshare<br>Trip Explorer</h1>
    <p>2020–2025 · 24.7M rides · OSRM routed</p>
  </div>

  <div id="stats-bar">
    <div class="stat">
      <div class="stat-val" id="stat-trips">—</div>
      <div class="stat-label">Trips loaded</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-km">—</div>
      <div class="stat-label">Total km</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-median">—</div>
      <div class="stat-label">Median dist</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-ratio">—</div>
      <div class="stat-label">Median ratio</div>
    </div>
  </div>

  <div id="filters">
    <div class="filter-row">
      <span class="filter-label">From</span>
      <select id="f-month-start"></select>
    </div>
    <div class="filter-row">
      <span class="filter-label">To</span>
      <select id="f-month-end"></select>
    </div>
    <div class="filter-row">
      <span class="filter-label">Bike</span>
      <div class="chip-group" id="f-bike">
        <div class="chip active" data-val="electric_bike">Electric</div>
        <div class="chip active" data-val="classic_bike">Classic</div>
        <div class="chip active" data-val="docked_bike">Docked</div>
      </div>
    </div>
    <div class="filter-row">
      <span class="filter-label">User</span>
      <div class="chip-group" id="f-user">
        <div class="chip active" data-val="Member">Member</div>
        <div class="chip active" data-val="Casual">Casual</div>
      </div>
    </div>
    <div class="filter-row">
      <span class="filter-label">Type</span>
      <div class="chip-group" id="f-type">
        <div class="chip active" data-val="station-to-station">S→S</div>
        <div class="chip active" data-val="station-to-point">S→P</div>
        <div class="chip active" data-val="point-to-station">P→S</div>
        <div class="chip active" data-val="point-to-point">P→P</div>
      </div>
    </div>
  </div>

  <button id="load-btn">Load Trips</button>
  <div id="status">Ready — select a date range and load.</div>

  <div id="leaderboard-header">
    <span>Notable trips</span>
    <select id="sort-select" class="">
      <option value="distance">Longest distance</option>
      <option value="duration">Longest ride</option>
      <option value="ratio_high">Slowest vs route</option>
      <option value="ratio_low">Fastest vs route</option>
    </select>
  </div>

  <div id="trip-list"></div>
</div>

<div id="map"></div>

<div id="layer-toggles">
  <button class="layer-btn active" id="btn-routes">Routes</button>
  <button class="layer-btn" id="btn-heat">Heatmap</button>
  <button class="layer-btn" id="btn-stations">Stations</button>
</div>

<div id="detail-panel">
  <div id="detail-close">✕</div>
  <div class="detail-title" id="detail-title">Trip Detail</div>
  <div id="detail-body"></div>
</div>

<div id="loading-overlay">
  <div class="loading-text" id="loading-msg">Initializing DuckDB…</div>
  <div class="loading-bar"><div class="loading-bar-inner" id="loading-bar"></div></div>
</div>

<script type="module">
// ── CONFIG ──────────────────────────────────────────────────────────────────
const MAPBOX_TOKEN = 'pk.eyJ1IjoiYnJ5a2wiLCJhIjoiY21wOTZiNXZvMHBxajJycTBrNzU3Nm1ibSJ9.1h2a0si-A3F7XVplUQ_1MQ';
const S3_BASE = 'https://bryvado-cbs-pipeline-data-2026.s3.us-east-1.amazonaws.com/data/processed/dashboard';
const MONTHS = [];
for (let y = 2020; y <= 2025; y++) {
  const startM = y === 2020 ? 5 : 1;
  const endM = y === 2025 ? 11 : 12;
  for (let m = startM; m <= endM; m++) {
    MONTHS.push(`${y}-${String(m).padStart(2,'0')}`);
  }
}

// ── MONTH SELECTS ───────────────────────────────────────────────────────────
const startSel = document.getElementById('f-month-start');
const endSel = document.getElementById('f-month-end');
MONTHS.forEach(m => {
  startSel.innerHTML += `<option value="${m}">${m}</option>`;
  endSel.innerHTML += `<option value="${m}">${m}</option>`;
});
startSel.value = '2024-01';
endSel.value = '2024-03';

// ── CHIP TOGGLES ────────────────────────────────────────────────────────────
document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => c.classList.toggle('active'));
});

// ── MAPBOX ──────────────────────────────────────────────────────────────────
mapboxgl.accessToken = MAPBOX_TOKEN;
const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [-77.04, 38.91],
  zoom: 11.5,
  attributionControl: false
});

// ── DUCKDB ──────────────────────────────────────────────────────────────────
let db, conn, currentTrips = [];

async function initDuckDB() {
  setStatus('Loading DuckDB-WASM…');
  setBar(10);

  const duckdb = await import('https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@latest/+esm');
  setBar(40);

  const JSDELIVR_BUNDLES = duckdb.getJsDelivrBundles();
  const bundle = await duckdb.selectBundle(JSDELIVR_BUNDLES);

  const worker_url = URL.createObjectURL(
    new Blob([`importScripts("${bundle.mainWorker}");`], { type: 'text/javascript' })
  );
  const worker = new Worker(worker_url);
  const logger = new duckdb.ConsoleLogger();
  db = new duckdb.AsyncDuckDB(logger, worker);
  await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
  URL.revokeObjectURL(worker_url);

  conn = await db.connect();
  // httpfs is bundled in duckdb-wasm — just load it, no install needed
  try { await conn.query(`LOAD httpfs;`); } catch(_) {}

  setBar(100);
  setStatus('Ready — select a date range and load.');
  document.getElementById('loading-overlay').classList.add('hidden');
  document.getElementById('load-btn').disabled = false;
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }
function setBar(pct) { document.getElementById('loading-bar').style.width = pct + '%'; }

// ── LOAD & QUERY ─────────────────────────────────────────────────────────────
document.getElementById('load-btn').addEventListener('click', loadTrips);

async function loadTrips() {
  const startM = startSel.value;
  const endM = endSel.value;
  if (startM > endM) { setStatus('Start must be before end.'); return; }

  const bikeTypes = [...document.querySelectorAll('#f-bike .chip.active')].map(c => c.dataset.val);
  const userTypes = [...document.querySelectorAll('#f-user .chip.active')].map(c => c.dataset.val);
  const rideTypes = [...document.querySelectorAll('#f-type .chip.active')].map(c => c.dataset.val);

  if (!bikeTypes.length || !userTypes.length || !rideTypes.length) {
    setStatus('Select at least one option in each filter.');
    return;
  }

  const selMonths = MONTHS.filter(m => m >= startM && m <= endM);
  if (!selMonths.length) { setStatus('No months in range.'); return; }

  document.getElementById('load-btn').disabled = true;
  setStatus(`Loading ${selMonths.length} month(s)…`);

  // Build parquet URLs
  const urls = selMonths.map(m => `'${S3_BASE}/trips_${m}.parquet'`);
  const urlList = urls.join(', ');

  const bikeList = bikeTypes.map(b => `'${b}'`).join(',');
  const userList = userTypes.map(u => `'${u}'`).join(',');
  const rideList = rideTypes.map(r => `'${r}'`).join(',');

  try {
    setStatus('Querying…');

    const query = `
      SELECT
        ride_id,
        rideable_type,
        strftime('%Y-%m-%d %H:%M', started_at::TIMESTAMP) AS started_fmt,
        CAST(duration_secs AS INTEGER) AS duration_secs,
        start_station_id,
        end_station_id,
        start_lat, start_lng, end_lat, end_lng,
        user_type, ride_type,
        ROUND(osrm_distance_m) AS distance_m,
        ROUND(osrm_duration_s) AS osrm_dur,
        ROUND(duration_ratio, 2) AS ratio,
        geometry
      FROM read_parquet([${urlList}])
      WHERE rideable_type IN (${bikeList})
        AND user_type IN (${userList})
        AND ride_type IN (${rideList})
        AND geometry IS NOT NULL
        AND osrm_distance_m > 100
    `;

    const result = await conn.query(query);
    const fields = result.schema.fields.map(f => f.name);
    const rows = result.toArray().map(row => {
      const obj = {};
      fields.forEach(f => {
        const v = row[f];
        obj[f] = typeof v === 'bigint' ? Number(v) : v;
      });
      return obj;
    });

    currentTrips = rows;
    updateStats(rows);
    renderLeaderboard(rows);
    renderMapLayers(rows);
    setStatus(`Loaded ${rows.length.toLocaleString()} trips.`);
  } catch(e) {
    console.error('FULL ERROR:', e);
    console.error('MESSAGE:', e.message);
    setStatus('Error: ' + e.message);
    alert('Error: ' + e.message);
  }

  document.getElementById('load-btn').disabled = false;
}

// ── STATS ────────────────────────────────────────────────────────────────────
function updateStats(trips) {
  const n = trips.length;
  const totalKm = trips.reduce((s, t) => s + (t.distance_m || 0), 0) / 1000;
  const distances = trips.map(t => t.distance_m || 0).sort((a,b) => a-b);
  const median = distances[Math.floor(n/2)] || 0;
  const ratios = trips.map(t => t.ratio || 0).filter(r => r > 0 && r < 100).sort((a,b) => a-b);
  const medRatio = ratios[Math.floor(ratios.length/2)] || 0;

  document.getElementById('stat-trips').textContent = n >= 1000 ? (n/1000).toFixed(1)+'K' : n;
  document.getElementById('stat-km').textContent = totalKm >= 1000 ? (totalKm/1000).toFixed(1)+'M' : Math.round(totalKm)+'K';
  document.getElementById('stat-median').textContent = Math.round(median)+'m';
  document.getElementById('stat-ratio').textContent = medRatio.toFixed(2)+'×';
}

// ── LEADERBOARD ───────────────────────────────────────────────────────────────
const sortSel = document.getElementById('sort-select');
sortSel.addEventListener('change', () => renderLeaderboard(currentTrips));

function renderLeaderboard(trips) {
  const sort = sortSel.value;
  const sorted = [...trips].filter(t => t.distance_m && t.ratio);

  if (sort === 'distance') sorted.sort((a,b) => b.distance_m - a.distance_m);
  else if (sort === 'duration') sorted.sort((a,b) => b.duration_secs - a.duration_secs);
  else if (sort === 'ratio_high') sorted.sort((a,b) => b.ratio - a.ratio);
  else if (sort === 'ratio_low') sorted.sort((a,b) => a.ratio - b.ratio);

  const top = sorted.slice(0, 50);
  const list = document.getElementById('trip-list');
  list.innerHTML = '';

  top.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'trip-card';
    card.dataset.idx = i;

    let metric, metricLabel;
    if (sort === 'distance') { metric = (t.distance_m/1000).toFixed(2)+' km'; metricLabel = 'distance'; }
    else if (sort === 'duration') { metric = fmtDur(t.duration_secs); metricLabel = 'duration'; }
    else if (sort === 'ratio_high') { metric = t.ratio+'×'; metricLabel = 'actual/route'; }
    else { metric = t.ratio+'×'; metricLabel = 'actual/route'; }

    const bikeIcon = t.rideable_type === 'electric_bike' ? '⚡' : t.rideable_type === 'classic_bike' ? '🚲' : '🔒';

    card.innerHTML = `
      <div class="trip-card-top">
        <span class="trip-type">${bikeIcon} ${t.ride_type?.replace(/-/g,' ')}</span>
        <span class="trip-metric">${metric}</span>
      </div>
      <div class="trip-meta">
        <strong>${t.started_fmt}</strong> · ${t.user_type}<br>
        ${(t.distance_m/1000).toFixed(2)} km · ${fmtDur(t.duration_secs)}
      </div>
    `;

    card.addEventListener('click', () => selectTrip(t, card));
    list.appendChild(card);
  });

  // Store top trips for map
  window._topTrips = top;
}

function fmtDur(secs) {
  if (!secs) return '—';
  const h = Math.floor(secs/3600);
  const m = Math.floor((secs%3600)/60);
  const s = secs%60;
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

// ── SELECT TRIP ───────────────────────────────────────────────────────────────
function selectTrip(trip, card) {
  document.querySelectorAll('.trip-card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');

  // Show on map
  if (trip.geometry) {
    try {
      const geom = JSON.parse(trip.geometry);
      if (map.getSource('selected-route')) {
        map.getSource('selected-route').setData({ type: 'Feature', geometry: geom, properties: {} });
      } else {
        map.addSource('selected-route', {
          type: 'geojson',
          data: { type: 'Feature', geometry: geom, properties: {} }
        });
        map.addLayer({
          id: 'selected-route',
          type: 'line',
          source: 'selected-route',
          paint: {
            'line-color': '#e8ff47',
            'line-width': 3,
            'line-opacity': 1
          }
        });
      }

      // Fit map to route
      const coords = geom.coordinates;
      if (coords && coords.length > 0) {
        const lngs = coords.map(c => c[0]);
        const lats = coords.map(c => c[1]);
        map.fitBounds([
          [Math.min(...lngs)-0.01, Math.min(...lats)-0.01],
          [Math.max(...lngs)+0.01, Math.max(...lats)+0.01]
        ], { padding: 60, duration: 800 });
      }
    } catch(e) { console.warn('geometry parse error', e); }
  }

  // Detail panel
  const panel = document.getElementById('detail-panel');
  document.getElementById('detail-title').textContent = `${trip.ride_type?.replace(/-/g,' ')}`;
  document.getElementById('detail-body').innerHTML = `
    <div class="detail-row"><span>Date</span><span>${trip.started_fmt}</span></div>
    <div class="detail-row"><span>Bike</span><span>${trip.rideable_type?.replace('_',' ')}</span></div>
    <div class="detail-row"><span>User</span><span>${trip.user_type}</span></div>
    <div class="detail-row"><span>Distance</span><span>${(trip.distance_m/1000).toFixed(2)} km</span></div>
    <div class="detail-row"><span>Actual time</span><span>${fmtDur(trip.duration_secs)}</span></div>
    <div class="detail-row"><span>OSRM time</span><span>${fmtDur(trip.osrm_dur)}</span></div>
    <div class="detail-row"><span>Ratio</span><span>${trip.ratio}×</span></div>
    <div class="detail-row"><span>Ride ID</span><span style="font-size:9px">${trip.ride_id}</span></div>
  `;
  panel.classList.add('visible');
}

document.getElementById('detail-close').addEventListener('click', () => {
  document.getElementById('detail-panel').classList.remove('visible');
  document.querySelectorAll('.trip-card').forEach(c => c.classList.remove('active'));
});

// ── MAP LAYERS ────────────────────────────────────────────────────────────────
let routesVisible = true, heatVisible = false, stationsVisible = false;

function renderMapLayers(trips) {
  // Sample for performance — up to 5000 routes on map
  const sample = trips.length > 5000
    ? trips.sort(() => Math.random()-0.5).slice(0, 5000)
    : trips;

  const features = sample
    .filter(t => t.geometry)
    .map(t => {
      try {
        return {
          type: 'Feature',
          geometry: JSON.parse(t.geometry),
          properties: {
            distance: t.distance_m,
            ratio: t.ratio,
            bike: t.rideable_type
          }
        };
      } catch { return null; }
    })
    .filter(Boolean);

  const geojson = { type: 'FeatureCollection', features };

  if (map.getSource('routes')) {
    map.getSource('routes').setData(geojson);
  } else {
    map.addSource('routes', { type: 'geojson', data: geojson });

    // Routes layer
    map.addLayer({
      id: 'routes-layer',
      type: 'line',
      source: 'routes',
      paint: {
        'line-color': [
          'match', ['get', 'bike'],
          'electric_bike', '#47c8ff',
          'classic_bike', '#a0ff47',
          '#ff8c47'
        ],
        'line-width': 1,
        'line-opacity': 0.25
      }
    });

    // Heatmap layer
    map.addLayer({
      id: 'heat-layer',
      type: 'heatmap',
      source: 'routes',
      layout: { visibility: 'none' },
      paint: {
        'heatmap-weight': ['interpolate', ['linear'], ['get', 'distance'], 0, 0, 5000, 1],
        'heatmap-intensity': 0.6,
        'heatmap-color': [
          'interpolate', ['linear'], ['heatmap-density'],
          0, 'rgba(0,0,0,0)',
          0.2, '#47c8ff',
          0.6, '#e8ff47',
          1, '#ff4757'
        ],
        'heatmap-radius': 15,
        'heatmap-opacity': 0.7
      }
    });
  }

  // Origin points for stations view
  const pointFeatures = trips.slice(0, 10000).map(t => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: [t.start_lng, t.start_lat] },
    properties: {}
  }));

  const pointGj = { type: 'FeatureCollection', features: pointFeatures };
  if (map.getSource('origins')) {
    map.getSource('origins').setData(pointGj);
  } else {
    map.addSource('origins', { type: 'geojson', data: pointGj });
    map.addLayer({
      id: 'stations-layer',
      type: 'circle',
      source: 'origins',
      layout: { visibility: 'none' },
      paint: {
        'circle-radius': 4,
        'circle-color': '#e8ff47',
        'circle-opacity': 0.6,
        'circle-stroke-width': 0
      }
    });
  }
}

// ── LAYER TOGGLE BUTTONS ──────────────────────────────────────────────────────
document.getElementById('btn-routes').addEventListener('click', function() {
  routesVisible = !routesVisible;
  this.classList.toggle('active', routesVisible);
  if (map.getLayer('routes-layer'))
    map.setLayoutProperty('routes-layer', 'visibility', routesVisible ? 'visible' : 'none');
});

document.getElementById('btn-heat').addEventListener('click', function() {
  heatVisible = !heatVisible;
  this.classList.toggle('active', heatVisible);
  if (map.getLayer('heat-layer'))
    map.setLayoutProperty('heat-layer', 'visibility', heatVisible ? 'visible' : 'none');
});

document.getElementById('btn-stations').addEventListener('click', function() {
  stationsVisible = !stationsVisible;
  this.classList.toggle('active', stationsVisible);
  if (map.getLayer('stations-layer'))
    map.setLayoutProperty('stations-layer', 'visibility', stationsVisible ? 'visible' : 'none');
});

map.on('load', async () => {
  await initDuckDB();
});
